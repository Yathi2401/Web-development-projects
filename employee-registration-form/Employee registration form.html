<html>
    <head>
        <title>Employee Registration Form</title>
    </head>

    <body>
        <table bgcolor="darkgreen" height="600px" width="600px" boardercolor = "white" align="center" valign="center">
            <tr>
                <th colspan="2" align="center" valign="center">
                    <img src="5138.webp" width="40" height="40">
                    <font size="100" color="red">
                        <b>Employee Registration Form</b>
                    </font>
                </th>            
            </tr>
            <tr valign="top">
                <td>   </td>
                <td>
                    <lable> </lable>
                    <input type="radio">Mr.
                    <input type="radio">Mrs.
                    <input type="radio">Ms.
                </td>
            </tr>
            <tr>
                <td><lable>First Name</lable></td> 
                <td> <input type="text" placeholder="First Name"></td>
            </tr>
            <tr>
                <td><lable>Email <Address></Address></lable></td> 
                <td> <input type="text" placeholder="Email"></td>
            </tr>
            <tr>
                <td><lable>City</lable></td> 
                <td> <input type="text" placeholder="City"></td>
            </tr>
            <tr>
                <td><lable>Last Name</lable></td> 
                <td> <input type="text" placeholder="Last Name"></td>
            </tr>
            <tr>
                <td><lable>Province</lable></td>
                <td><select>
                         <option>Northern</option>
                         <option>Western</option>
                         <option>South</option>
                         <option>Central</option>
                         <option>Eastern</option>
                         <option>North Western</option>
                         <option>North Central</option>
                         <option>Uva</option>
                         <option>Sabaragamuwa</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><lable>Zip Code</lable></td>
                <td><input type="text" placeholder="Zip Code"></td>
            </tr>
            <tr>
                <td><lable>Upload Photo</lable></td>
                <td> <input type="file"></td>
            </tr>
            <tr>
                <td><lable>Mobile</lable></td>
                <td><input type="number" placeholder="+94"></td>
            </tr>
            <tr>
                <td><lable>Language Known</lable></td>
                <td>
                    <input type="checkbox">Tamil<br>
                    <input type="checkbox">English<br>
                    <input type="checkbox">Sinhala<br>
                </td>
            </tr>
            <tr>
                <td><lable>Additional </lable></td>
                <td><textarea rows="5" cols="30" placeholder="Optional"></textarea>
                </td>
            </tr>
            <tr>
                <td></td>   
                <td>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>


    </body>
</html>
